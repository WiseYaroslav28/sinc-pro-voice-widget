<!DOCTYPE html>
<html class="dark" lang="ru">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SINC PRO - Виджет озвучки</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: transparent;
        width: 100vw; height: 100vh;
        display: flex; align-items: center; justify-content: center;
      }

      /* Анимация пульсации при воспроизведении */
      .play-pulse { animation: pulse-glow 1.5s infinite; }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(142,82,255,0.5); transform: scale(1); }
        50%       { box-shadow: 0 0 20px rgba(142,82,255,0.8); transform: scale(1.06); }
      }

      /* Dropdown-меню, открывающееся ВНИЗ (виджет в верхней части экрана) */
      .dropdown-menu {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        background: #1c1b23;
        border: 1px solid rgba(142,82,255,0.3);
        border-radius: 10px;
        padding: 6px;
        min-width: 140px;
        display: none;
        flex-direction: column;
        gap: 2px;
        z-index: 100;
        box-shadow: 0 8px 24px rgba(0,0,0,0.6);
      }
      .dropdown-menu.open { display: flex; }
      .dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 7px;
        font-size: 12px;
        color: #ccc3d8;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .dropdown-item:hover { background: rgba(142,82,255,0.15); color: white; }
      .dropdown-item.selected { color: #8e52ff; font-weight: 600; }

      /* Разделитель между секциями */
      .menu-section-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #4a4455;
        padding: 4px 10px 2px;
      }
      .menu-divider { height: 1px; background: rgba(74,68,85,0.3); margin: 4px 0; }

      /* Кнопка-пилюля (секция с разделителем) */
      .pill-btn {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 5px 10px;
        border-radius: 7px;
        cursor: pointer;
        transition: background 0.15s;
        color: #ccc3d8;
        font-size: 12px;
        font-weight: 500;
        white-space: nowrap;
        background: transparent;
        border: none;
        position: relative;
      }
      .pill-btn:hover { background: rgba(255,255,255,0.05); color: white; }
      .pill-btn.active { color: #8e52ff; }

      /* Иконка-кнопка в нижнем ряду */
      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px; height: 32px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        color: #ccc3d8;
        background: transparent;
        border: none;
      }
      .icon-btn:hover { background: rgba(255,255,255,0.07); color: #45a29e; }
    </style>
  </head>

  <body class="bg-transparent text-[#e4e1e9] antialiased">
    <div class="bg-[#1b1b20] rounded-2xl border border-[#4a4455]/30 shadow-[0_8px_32px_rgba(0,0,0,0.5)] overflow-visible transition-all duration-300 hover:border-[#8e52ff]/40"
         id="widget-container"
         style="width: 320px;">

      <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <!-- SLIM ROW (всегда видна)                      -->
      <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <div class="flex items-center px-2 py-2 gap-1" id="slim-row">

        <!-- 🔊 Голос + язык (dropdown вниз, динамически) -->
        <div class="relative" id="voice-wrapper">
          <button class="pill-btn" id="btn-voice" title="Голос озвучки">
            <span class="material-symbols-outlined text-[16px] text-[#ccc3d8]/60" style="font-variation-settings:'FILL' 1;">volume_up</span>
            <span id="selected-voice-label">Загрузка...</span>
            <span class="material-symbols-outlined text-[14px] text-[#4a4455]">expand_more</span>
          </button>
          <div class="dropdown-menu" id="voice-menu" style="min-width: 200px; max-height: 280px; overflow-y: auto;">
            <div class="menu-section-label">Голоса</div>
            <!-- Пополняется через JS после загрузки системных голосов -->
          </div>
        </div>

        <!-- Разделитель -->
        <div class="w-px h-5 bg-[#4a4455]/30 mx-1 flex-shrink-0"></div>

        <!-- ⚡ Скорость (dropdown вниз) -->
        <div class="relative" id="speed-wrapper">
          <button class="pill-btn" id="btn-speed" title="Скорость воспроизведения">
            <span class="material-symbols-outlined text-[14px] text-[#45a29e]">bolt</span>
            <span id="selected-speed-label">1.0x</span>
          </button>
          <div class="dropdown-menu" id="speed-menu" style="min-width: 160px; left: auto; right: 0;">
            <div class="menu-section-label">Скорость</div>
            <div class="dropdown-item" data-speed="0.5">0.5x</div>
            <div class="dropdown-item" data-speed="0.75">0.75x</div>
            <div class="dropdown-item selected" data-speed="1.0">1.0x</div>
            <div class="dropdown-item" data-speed="1.25">1.25x</div>
            <div class="dropdown-item" data-speed="1.5">1.5x</div>
            <div class="dropdown-item" data-speed="1.75">1.75x</div>
            <div class="dropdown-item" data-speed="2.0">2.0x</div>
            <div class="dropdown-item" data-speed="2.25">2.25x</div>
            <div class="dropdown-item" data-speed="2.5">2.5x</div>
            <div class="dropdown-item" data-speed="3.0">3.0x</div>
            <div style="padding: 6px 10px 4px;">
              <div class="menu-section-label" style="margin-bottom:4px;">Тонкая настройка</div>
              <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.05" value="1.0"
                style="width:100%; accent-color:#8e52ff; cursor:pointer;">
              <div style="display:flex; justify-content:space-between; font-size:10px; color:#ccc3d8; margin-top:2px;">
                <span>0.5x</span>
                <span id="speed-slider-val">1.0x</span>
                <span>3.0x</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Разделитель -->
        <div class="w-px h-5 bg-[#4a4455]/30 mx-1 flex-shrink-0"></div>

        <!-- ▶ Play/Pause -->
        <button class="flex items-center justify-center w-9 h-9 rounded-full bg-[#8e52ff] text-white hover:bg-[#a377ff] transition-all active:scale-95 shadow-[0_0_12px_rgba(142,82,255,0.4)] flex-shrink-0 cursor-pointer border-0"
                id="widget-play" title="Озвучить буфер обмена">
          <span class="material-symbols-outlined text-[20px]" id="widget-play-icon" style="font-variation-settings:'FILL' 1;">play_arrow</span>
        </button>

        <!-- Разделитель -->
        <div class="w-px h-5 bg-[#4a4455]/30 mx-1 flex-shrink-0"></div>

        <!-- 文A — Перевод перед чтением -->
        <button class="icon-btn" id="btn-translate" title="Переводить перед чтением (RU→EN)">
          <span class="material-symbols-outlined text-[18px]">translate</span>
        </button>

        <!-- Разделитель -->
        <div class="w-px h-5 bg-[#4a4455]/30 mx-1 flex-shrink-0"></div>

        <!-- ··· Развернуть -->
        <button class="icon-btn" id="btn-expand" title="Развернуть / свернуть">
          <span class="material-symbols-outlined text-[18px]" id="expand-icon">open_in_full</span>
        </button>

      </div><!-- /slim-row -->

      <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <!-- EXPANDED ROW (скрыт по умолчанию)           -->
      <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <div class="hidden items-center justify-between px-3 py-2 border-t border-[#4a4455]/15" id="expanded-row">
        <!-- Утилиты -->
        <div class="flex items-center gap-1">
          <button class="icon-btn" id="widget-ocr-trigger" title="Перевод экрана (Alt+Q)">
            <span class="material-symbols-outlined text-[18px]">center_focus_strong</span>
          </button>
          <button class="icon-btn" id="widget-history-trigger" title="Журнал записей">
            <span class="material-symbols-outlined text-[18px]">description</span>
          </button>
          <button class="icon-btn" id="widget-settings-trigger" title="Настройки">
            <span class="material-symbols-outlined text-[18px]">settings</span>
          </button>
        </div>
        <!-- КАПСУЛА ИИ тумблер -->
        <div class="flex items-center gap-2">
          <span class="text-[10px] font-bold text-[#45a29e] uppercase tracking-wider">Капсула ИИ</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="widget-toggle-capsule" class="sr-only peer" checked />
            <div class="w-9 h-5 bg-[#35343a] rounded-full peer
                        peer-checked:bg-[#45a29e]
                        after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                        after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all
                        peer-checked:after:translate-x-4"></div>
          </label>
        </div>
      </div>

    </div><!-- /widget-container -->

    <script>
      // =====================================================================
      // ЕДИНЫЙ ИСТОЧНИК ПРАВДЫ — состояние виджета
      // =====================================================================
      let currentLang      = 'ru';   // будет обновлено buildVoiceMenu()
      let currentVoiceName = '';     // будет обновлено buildVoiceMenu()
      let currentRate      = 1.0;
      let translateEnabled = false;
      let isPlaying        = false;
      let currentUtterance = null;
      const synth = window.speechSynthesis;

      // =====================================================================
      // УТИЛИТЫ — управление dropdown
      // =====================================================================
      function openMenu(menuEl) {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
        menuEl.classList.add('open');
      }
      function closeAllMenus() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
      }
      document.addEventListener('click', closeAllMenus);

      // =====================================================================
      // ГОЛОС — список голосов как в v3.3.6 (Neural/Natural = не роботизированные)
      // =====================================================================
      const btnVoice        = document.getElementById('btn-voice');
      const voiceMenu       = document.getElementById('voice-menu');
      const selectedVoiceLabel = document.getElementById('selected-voice-label');

      // Единый источник правды: те же голоса что были в Python-версии (Neural = премиум)
      // Имена соответствуют Windows speechSynthesis голосам (Microsoft * Online Natural)
      const PREFERRED_VOICES = [
        { label: 'Светлана (RU)', lang: 'ru', search: ['Svetlana', 'svetlana'] },
        { label: 'Дмитрий (RU)',  lang: 'ru', search: ['Dmitry', 'Dmitri', 'dmitry'] },
        { label: 'Guy (EN)',       lang: 'en', search: ['Guy'] },
        { label: 'Aria (EN)',      lang: 'en', search: ['Aria'] },
        { label: 'Jenny (EN)',     lang: 'en', search: ['Jenny'] },
        { label: 'Katja (DE)',     lang: 'de', search: ['Katja', 'Hedda'] },
        { label: 'Denise (FR)',    lang: 'fr', search: ['Denise', 'Julie'] },
        { label: 'Alvaro (ES)',    lang: 'es', search: ['Alvaro', 'Pablo'] },
        { label: 'Xiaoxiao (CN)', lang: 'zh', search: ['Xiaoxiao'] },
      ];

      function buildVoiceMenu(allVoices) {
        let html = '';
        let firstVoice = null;

        for (const pref of PREFERRED_VOICES) {
          // Ищем голос в системе по ключевым словам
          const found = allVoices.find(v =>
            pref.search.some(kw => v.name.includes(kw)) && v.lang.toLowerCase().startsWith(pref.lang)
          );
          // Если не нашли — берём лучший по языку (Online/Natural > прочие)
          const fallback = allVoices
            .filter(v => v.lang.toLowerCase().startsWith(pref.lang))
            .sort((a, b) => {
              const rank = v => /natural/i.test(v.name) ? 0 : /online/i.test(v.name) ? 1 : /premium/i.test(v.name) ? 2 : 3;
              return rank(a) - rank(b);
            })[0];
          const voice = found || fallback;
          if (!voice) continue;

          const voiceName = voice.name;
          html += `<div class="dropdown-item" data-lang="${pref.lang}" data-voice-name="${voiceName}" data-label="${pref.label}">${pref.label}</div>`;
          if (!firstVoice && pref.lang === 'ru') firstVoice = { lang: pref.lang, name: voiceName, label: pref.label };
        }

        // Если ни одного не нашли — показываем все системные
        if (!html) {
          html = allVoices.slice(0, 15).map(v =>
            `<div class="dropdown-item" data-lang="${v.lang.slice(0,2)}" data-voice-name="${v.name}" data-label="${v.name}">${v.name}</div>`
          ).join('');
        }

        voiceMenu.innerHTML = html;

        // Первый русский голос по умолчанию
        if (firstVoice) {
          currentLang = firstVoice.lang;
          currentVoiceName = firstVoice.name;
          selectedVoiceLabel.textContent = firstVoice.label;
          voiceMenu.querySelector(`[data-voice-name="${firstVoice.name}"]`)?.classList.add('selected');
        }

        // Обработчики кликов
        voiceMenu.querySelectorAll('.dropdown-item').forEach(item => {
          item.addEventListener('click', (e) => {
            e.stopPropagation();
            voiceMenu.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            currentLang      = item.dataset.lang;
            currentVoiceName = item.dataset.voiceName || '';
            selectedVoiceLabel.textContent = item.dataset.label;
            closeAllMenus();
          });
        });
      }

      // Загружаем голоса с polling fallback для WebView2
      function loadVoices() {
        const voices = synth.getVoices();
        if (voices.length > 0) { buildVoiceMenu(voices); return; }

        let attempts = 0;
        const poll = setInterval(() => {
          const v = synth.getVoices();
          if (v.length > 0) {
            clearInterval(poll);
            buildVoiceMenu(v);
          } else if (++attempts >= 20) {
            clearInterval(poll);
            selectedVoiceLabel.textContent = 'Голос (OS)';
          }
        }, 250);

        speechSynthesis.onvoiceschanged = () => {
          clearInterval(poll);
          buildVoiceMenu(synth.getVoices());
        };
      }

      btnVoice.addEventListener('click', (e) => {
        e.stopPropagation();
        voiceMenu.classList.contains('open') ? closeAllMenus() : openMenu(voiceMenu);
      });

      loadVoices();

      // =====================================================================
      // СКОРОСТЬ — dropdown
      // =====================================================================
      const btnSpeed         = document.getElementById('btn-speed');
      const speedMenu        = document.getElementById('speed-menu');
      const selectedSpeedLabel = document.getElementById('selected-speed-label');

      btnSpeed.addEventListener('click', (e) => {
        e.stopPropagation();
        speedMenu.classList.contains('open') ? closeAllMenus() : openMenu(speedMenu);
      });

      speedMenu.querySelectorAll('.dropdown-item').forEach(item => {
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          speedMenu.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
          item.classList.add('selected');
          currentRate = parseFloat(item.dataset.speed);
          selectedSpeedLabel.textContent = item.dataset.speed + 'x';
          // Синхронизируем слайдер
          const slider = document.getElementById('speed-slider');
          if (slider) { slider.value = currentRate; document.getElementById('speed-slider-val').textContent = currentRate.toFixed(2) + 'x'; }
          closeAllMenus();
        });
      });

      // Слайдер тонкой настройки скорости
      const speedSlider = document.getElementById('speed-slider');
      const speedSliderVal = document.getElementById('speed-slider-val');
      if (speedSlider) {
        speedSlider.addEventListener('input', (e) => {
          e.stopPropagation();
          currentRate = parseFloat(speedSlider.value);
          const label = currentRate.toFixed(2) + 'x';
          selectedSpeedLabel.textContent = label;
          speedSliderVal.textContent = label;
          // Снимаем выделение со всех пресетов
          speedMenu.querySelectorAll('.dropdown-item').forEach(i => i.classList.remove('selected'));
          // Выделяем если точно совпадает с пресетом
          speedMenu.querySelectorAll('.dropdown-item').forEach(i => {
            if (Math.abs(parseFloat(i.dataset.speed) - currentRate) < 0.01) i.classList.add('selected');
          });
        });
        speedSlider.addEventListener('click', e => e.stopPropagation());
      }

      // =====================================================================
      // ПЕРЕВОД
      // =====================================================================
      const btnTranslate = document.getElementById('btn-translate');
      btnTranslate.addEventListener('click', (e) => {
        e.stopPropagation();
        translateEnabled = !translateEnabled;
        btnTranslate.style.color = translateEnabled ? '#45a29e' : '';
      });

      // =====================================================================
      // РАЗВЕРНУТЬ / СВЕРНУТЬ
      // =====================================================================
      const btnExpand   = document.getElementById('btn-expand');
      const expandedRow = document.getElementById('expanded-row');
      const expandIcon  = document.getElementById('expand-icon');

      btnExpand.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = expandedRow.classList.toggle('hidden') === false;
        expandedRow.classList.toggle('flex', !expandedRow.classList.contains('hidden'));
        expandIcon.textContent = expandedRow.classList.contains('hidden') ? 'open_in_full' : 'close_fullscreen';
      });

      // =====================================================================
      // TTS — синтез речи
      // =====================================================================
      const playBtn  = document.getElementById('widget-play');
      const playIcon = document.getElementById('widget-play-icon');

      async function getClipboardText() {
        if (window.__TAURI__?.clipboardManager) {
          try { return await window.__TAURI__.clipboardManager.readText(); } catch (_) {}
        }
        try {
          if (navigator.clipboard?.readText) return await navigator.clipboard.readText();
        } catch (_) {}
        return '';
      }

      function stopPlayback() {
        synth?.cancel();
        isPlaying = false;
        playIcon.textContent = 'play_arrow';
        playBtn.classList.remove('play-pulse');
        playBtn.title = 'Озвучить буфер обмена';
      }

      async function speakText(text) {
        if (!text) { stopPlayback(); return; }
        currentUtterance = new SpeechSynthesisUtterance(text);
        currentUtterance.rate = currentRate;

        // Ждём пока голоса загрузятся (на Windows может требоваться небольшая задержка)
        let voices = synth.getVoices();
        if (voices.length === 0) {
          await new Promise(resolve => {
            const onVoices = () => { resolve(); };
            speechSynthesis.onvoiceschanged = onVoices;
            setTimeout(resolve, 1000); // fallback таймаут
          });
          voices = synth.getVoices();
        }

        const langMap = { ru: 'ru', en: 'en', de: 'de' };
        const langCode = langMap[currentLang] || currentLang;

        // Если указан конкретный голос по имени — ищем его
        let voice = currentVoiceName
          ? voices.find(v => v.name.includes(currentVoiceName))
          : null;

        if (!voice) {
          // Приоритет: Natural/Online > Premium > любой для языка
          // (Microsoft Svetlana Online (Natural), Microsoft Dmitry Online (Natural) и т.п.)
          const forLang = voices.filter(v =>
            v.lang.toLowerCase().startsWith(langCode.toLowerCase())
          );

          voice = forLang.find(v => /natural/i.test(v.name))          // Высший приоритет: Natural
               || forLang.find(v => /online/i.test(v.name))           // Online (Premium)
               || forLang.find(v => /premium/i.test(v.name))          // Premium
               || forLang.find(v => /microsoft/i.test(v.name))        // Любой Microsoft
               || forLang[0]                                           // Первый подходящий
               || voices.find(v => v.lang.toLowerCase().startsWith(langCode.toLowerCase())); // Fallback
        }

        if (voice) currentUtterance.voice = voice;
        currentUtterance.lang = voice?.lang || (langCode + '-' + langCode.toUpperCase());

        currentUtterance.onend   = stopPlayback;
        currentUtterance.onerror = (e) => { console.error('TTS error:', e); stopPlayback(); };

        isPlaying = true;
        playIcon.textContent = 'pause';
        playBtn.classList.add('play-pulse');
        playBtn.title = 'Остановить воспроизведение';
        synth.speak(currentUtterance);
      }

      playBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        isPlaying ? stopPlayback() : speakText(await getClipboardText());
      });

      if (synth) {
        synth.getVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
          speechSynthesis.onvoiceschanged = () => synth.getVoices();
        }
      }

      // =====================================================================
      // TAURI: межоконное взаимодействие
      // =====================================================================
      const ocrTrigger      = document.getElementById('widget-ocr-trigger');
      const historyTrigger  = document.getElementById('widget-history-trigger');
      const settingsTrigger = document.getElementById('widget-settings-trigger');

      if (ocrTrigger) ocrTrigger.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (window.__TAURI__) {
          const w = window.__TAURI__.webviewWindow.WebviewWindow.getByLabel('ocr');
          if (w) await w.show();
        }
      });

      if (historyTrigger) historyTrigger.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (window.__TAURI__) await window.__TAURI__.event.emit('open-history');
      });

      if (settingsTrigger) settingsTrigger.addEventListener('click', async (e) => {
        e.stopPropagation();
        if (window.__TAURI__) await window.__TAURI__.event.emit('open-settings');
      });

      if (window.__TAURI__) {
        const appWindow = window.__TAURI__.webviewWindow.getCurrentWebviewWindow();
        const { WebviewWindow } = window.__TAURI__.webviewWindow;
        const PhysicalPosition = window.__TAURI__.dpi.PhysicalPosition;

        // ── Запоминание позиции ──────────────────────────────────────────
        // Восстанавливаем позицию при загрузке
        (async () => {
          try {
            const savedX = localStorage.getItem('widgetPosX');
            const savedY = localStorage.getItem('widgetPosY');
            if (savedX !== null && savedY !== null) {
              const x = parseInt(savedX, 10);
              const y = parseInt(savedY, 10);
              // Проверяем что координаты в разумных пределах (не за пределами всех мониторов)
              if (x > -4000 && x < 8000 && y > -2000 && y < 6000) {
                await appWindow.setPosition(new PhysicalPosition(x, y));
              }
            }
          } catch (e) {
            console.warn('[Widget] Не удалось восстановить позицию:', e);
          }
        })();

        // Сохраняем позицию через 300ms после окончания перетаскивания
        let savePositionTimer = null;
        document.getElementById('widget-container').addEventListener('mousedown', (e) => {
          if (e.buttons === 1 && !e.target.closest('button') && !e.target.closest('input') && !e.target.closest('.dropdown-menu')) {
            appWindow.startDragging();
            // После drag — сохраняем новую позицию
            const onMouseUp = async () => {
              clearTimeout(savePositionTimer);
              savePositionTimer = setTimeout(async () => {
                try {
                  const pos = await appWindow.outerPosition();
                  localStorage.setItem('widgetPosX', pos.x);
                  localStorage.setItem('widgetPosY', pos.y);
                } catch (_) {}
              }, 300);
              window.removeEventListener('mouseup', onMouseUp);
            };
            window.addEventListener('mouseup', onMouseUp);
          }
        });

        // Тумблер капсулы
        const toggleCapsule = document.getElementById('widget-toggle-capsule');
        if (toggleCapsule) {
          toggleCapsule.addEventListener('change', async (e) => {
            const win = WebviewWindow.getByLabel('capsule');
            if (win) {
              e.target.checked ? await win.show() : await win.hide();
            }
          });
        }

        // Синхронизация видимости капсулы
        window.__TAURI__.event.listen('capsule-visibility-changed', (event) => {
          const t = document.getElementById('widget-toggle-capsule');
          if (t) t.checked = event.payload;
        });

        // Слушаем запрос на озвучку из дашборда/других окон
        window.__TAURI__.event.listen('tts-speak-clipboard', async () => {
          try {
            const text = await getClipboardText();
            if (text && text.trim()) speakText(text.trim());
          } catch (e) {
            console.warn('[Widget TTS] Ошибка при чтении буфера:', e);
          }
        });

        window.__TAURI__.event.emit('widget-visibility-changed', true);
        appWindow.onCloseRequested(async () => {
          // Сохраняем финальную позицию перед закрытием
          try {
            const pos = await appWindow.outerPosition();
            localStorage.setItem('widgetPosX', pos.x);
            localStorage.setItem('widgetPosY', pos.y);
          } catch (_) {}
          window.__TAURI__.event.emit('widget-visibility-changed', false);
        });
      }
    </script>
  </body>
</html>
