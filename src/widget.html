<!DOCTYPE html>
<html class="dark" lang="ru">
  <head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SINC PRO - Виджет озвучки</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: transparent !important;
        background-color: transparent !important;
        width: 100vw; height: 100vh;
        display: flex; 
        align-items: flex-start; /* Примагничиваем к верху */
        justify-content: center;
        padding-top: 16px; /* Запас сверху для отображения тени */
      }
      .play-pulse { animation: pulse-glow 1.5s infinite; }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(142,82,255,0.5); transform: scale(1); }
        50%       { box-shadow: 0 0 20px rgba(142,82,255,0.8); transform: scale(1.06); }
      }
    </style>
  </head>

  <body class="bg-transparent text-[#e4e1e9] antialiased overflow-hidden">
    <script src="voice-core.js"></script>
    <script src="tts-widget.js"></script>
    
    <div class="bg-[#1b1b20] rounded-[26px] shadow-[0_8px_32px_rgba(0,0,0,0.5)] transition-all duration-300 inline-flex flex-col w-[500px] h-fit"
         id="widget-container"
         data-tauri-drag-region>
      
      <!-- Контейнер для единого компонента -->
      <div id="tts-widget-root" class="flex justify-center w-full"></div>

      <!-- ВТОРОЙ РЯД (дополнительные настройки) -->
      <div class="hidden border-t border-[#4a4455]/30 px-4 py-2 gap-3 items-center justify-between rounded-b-[26px]" id="expanded-row">
        <div class="flex items-center gap-3 text-[#ccc3d8]">
          <button class="flex items-center justify-center hover:text-[#45a29e] transition-colors cursor-pointer outline-none bg-transparent border-none p-0" title="Распознавание текста (OCR)">
            <span class="material-symbols-outlined text-[18px]">document_scanner</span>
          </button>
          <button class="flex items-center justify-center hover:text-white transition-colors cursor-pointer outline-none bg-transparent border-none p-0" title="Документ">
            <span class="material-symbols-outlined text-[18px]">description</span>
          </button>
          <button class="flex items-center justify-center hover:text-white transition-colors cursor-pointer outline-none bg-transparent border-none p-0" title="Настройки">
            <span class="material-symbols-outlined text-[18px]">settings</span>
          </button>
        </div>
        
        <div class="flex items-center gap-2">
          <span class="text-[11px] font-semibold tracking-wide text-[#ccc3d8]">AI</span>
          <button class="w-7 h-4 bg-[#4a4455] rounded-full relative cursor-pointer outline-none border-none transition-colors" id="btn-ai-toggle">
            <div class="w-3 h-3 bg-white rounded-full absolute left-0.5 top-0.5 transition-transform"></div>
          </button>
        </div>
      </div>

    </div>

    <script src="widget.js"></script>
  </body>
</html>
